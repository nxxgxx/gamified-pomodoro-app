  <body class="background-tile">
    <header

      <img

        alt=""

      />
      <nav>
        <ul class="flex-row gap-40 align-center">
          <li><button class="btn-outline">Login</button></li>
          <li><button class="btn-filled green-800">Create Account</button></li>

    <h1>header 1</h1>

    <h4>header 4</h4>
    <h5>header 5</h5>

    <p class="xs">paragraph xs</p>
    <p>paragraph</p>
    <p class="xl">paragraph xl</p>

    <p>paragraph with <a href="#">blank link</a></p>

    <button>Create Account <a href="#">With link</a></button>

    <button class="btn-filled cyan-800">Button Filled</button>
    <button class="btn-outline">Outline</button>
    <button class="btn-unfilled">None</button>
    <button class="btn-filled green-800">Button Filled</button>
    <div class="img-container radial">
      <img
        src="../src/assets/visuals/pokedoro_artwork_pikachu_train.png"

        src="../src/assets/visuals/pokedoro_icon_angle_down.svg"

        class="icon"
      />

    <div>

    </div>
    <img
      src="../src/assets//visuals/pokedoro_icon_back.svg"
      class="icon dark"
      alt="back button"
    />
    <img
      src="../src/assets//visuals/pokedoro_icon_back.svg"
      class="icon light clickable"
      alt="back button"
    />
    <form action="/action_page.php">
      <label for="fname">First name:</label>
      <input
        type="text"
        id="fname"
        name="fname"
        placeholder="trainer@gmail.com"
      /><br /><br />
      <label for="lname">Last name:</label>
      <input type="text" id="lname" name="lname" /><br /><br />
      <input type="submit" value="Submit" />

      <label class="custom-checkbox light">
        <input type="checkbox" id="agree" />
        <span class="checkmark"></span>
        I agree to the light terms
      </label>

      <label class="custom-checkbox dark">
        <input type="checkbox" id="agree" />
        <span class="checkmark"></span>
        I agree to the dark terms
      </label>
    </form>
